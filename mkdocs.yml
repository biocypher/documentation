site_name: BioCypher
site_url: https://biocypher.org
site_description: Open, ontology-grounded biomedical knowledge graph engineering.
repo_url: https://github.com/biocypher/biocypher
repo_name: biocypher/biocypher

theme:
  name: material
  custom_dir: overrides
  logo: assets/img/logo-biocypher.png
  favicon: assets/img/favicon-biocypher-32px.png
  features:
    - navigation.sections
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

  palette:
    scheme: default
    primary: custom
    accent: custom

nav:
  - About:
      - "": index.md
      - Philosophy: philosophy.md
      - Timeline and Publications: project.md
      - Sponsors: sponsors.md
      - Community:
          - User workshop 2026: community/2026-workshop.md
          - Join Us: community/index.md
          - Where to Start: community/contribute.md
          - Contribute to the Documentation: community/contribute-docs.md
          - Contribute to the Code Base: community/contribute-codebase.md

  - BioCypher: "!include ./biocypher/mkdocs.nav.yml"

  - BioChatter: "!include ./biochatter/mkdocs.nav.yml"

  - Biotope: "!include ./biotope/mkdocs.nav.yml"

  - Community: https://biocypher.zulipchat.com/

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [., biocypher, biochatter, biotope]
  - monorepo
  - table-reader
  - mkdocs-jupyter
  - redirects:
      redirect_maps: {} # Can be configured as needed

validation:
  nav:
    omitted_files: ignore

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - neoteroi.timeline
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      toc_depth: 3
      title: On this page

extra:
  social:
    - icon: simple/github
      link: https://github.com/biocypher
    - icon: simple/zulip
      link: https://biocypher.zulipchat.com/
    - icon: material/contacts
      link: https://saezlab.org/
    - icon: material/lightbulb
      link: https://slolab.ai/
  # version:
  #   provider: mike

extra_css:
  - assets/css/css-v1.1.0.css
  - assets/css/home-v1.0.0.css

extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - scripts/tablesort.js
  - scripts/counters.js
  - scripts/nav-drawer.js

copyright: © Copyright 2021-2025, BioCypher developers.
